name: .NET Build and Docs Check

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore Backend/Backend.sln

      - name: Build Project
        run: dotnet build Backend/Backend.sln --no-restore --configuration Release

      - name: Documentation Check
        run: echo "Code is ready for Doxygen documentation generation." ./Backend