<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>skincare architect</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <div class="header-content">
        <h1>skincare architect</h1>
        <span class="overlay-text">yes or no?</span>
    </div>
</header>

<main class="main-container">
    <div class="card">
        <h3>конструктор</h3>
        <input type="text" id="prodName" placeholder="назва продукту">
        <select id="ingType">
            <option value="Retinoid">ретиноїди (конфлікт з кислотами)</option>
            <option value="Acid">кислоти (конфлікт з ретиноїдами)</option>
            <option value="Moisturizer">зволоження (безпечно)</option>
        </select>
        <button class="btn-add" onclick="addProduct()">додати до аналізу</button>
        <button class="btn-undo" onclick="undoProduct()">скасувати дію</button>

        <div id="queueList" style="margin-top: 30px;"></div>
    </div>

    <div class="card">
        <h3>діагностика</h3>
        <button class="btn-scan" onclick="runAnalysis()">запустити сканування</button>
        <div id="reportArea" class="report-box" style="display:none;"></div>
    </div>
</main>

<script src="js/script.js"></script>
</body>
</html>
